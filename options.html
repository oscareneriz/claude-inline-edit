<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Claude Inline Edit — Settings</title>
  <style>
    :root {
      --bg:#f5edde; --bg2:#ebe0cc; --bg3:#dfd0b4; --sep:#c4b090;
      --fg:#2a1c0c; --fg2:#7a5c38; --fg3:#a07c50;
      --act:#40a8b8; --act2:#2888a0; --grn:#5ca870; --red:#d86050;
    }
    * { box-sizing: border-box; }
    body {
      font-family:"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--fg);
      margin:0; padding:28px; display:flex; justify-content:center;
    }
    .wrap { width:560px; max-width:100%; }
    h1 { font-size:20px; margin:0 0 4px; }
    .sub { color:var(--fg2); font-size:13px; margin:0 0 22px; }
    .card {
      background:var(--bg2); border:1px solid var(--sep); border-radius:14px;
      padding:18px; margin-bottom:18px;
    }
    .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.05em;
               color:var(--fg2); margin:0 0 12px; }
    label { display:block; font-size:13px; font-weight:600; margin:0 0 6px; }
    input, select {
      font-family:inherit; font-size:14px; color:var(--fg); width:100%;
      background:var(--bg); border:1px solid var(--sep); border-radius:9px;
      padding:9px 11px; outline:none;
    }
    input:focus, select:focus { border-color:var(--act); }
    .hint { font-size:12px; color:var(--fg3); margin-top:6px; }
    .hint a { color:var(--act2); }
    .btn {
      font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
      border:none; border-radius:9px; padding:10px 16px;
    }
    .btn-primary { background:var(--act); color:#fff; }
    .btn-primary:hover { background:var(--act2); }
    .btn-ghost { background:var(--bg3); color:var(--fg); }
    .btn-ghost:hover { background:var(--sep); }
    .btn-danger { background:transparent; color:var(--red); padding:6px 10px; font-size:18px; }
    .row { display:flex; gap:10px; align-items:flex-end; }
    .row > div { flex:1; }
    .preset {
      display:flex; gap:8px; align-items:center; background:var(--bg);
      border:1px solid var(--sep); border-radius:9px; padding:8px 10px; margin-bottom:8px;
    }
    .preset .name { font-weight:600; font-size:13px; min-width:130px; }
    .preset .instr { color:var(--fg2); font-size:12px; flex:1;
                     overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .add-row { display:flex; gap:8px; margin-top:10px; }
    .add-row input { flex:1; }
    .add-row .name-in { flex:0 0 150px; }
    #status { font-size:13px; font-weight:600; min-height:18px; margin-top:6px; }
    #status.ok { color:var(--grn); }
    #status.err { color:var(--red); }
    .saverow { display:flex; align-items:center; gap:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Claude Inline Edit</h1>
    <p class="sub">Highlight text anywhere → click the ✦ pill (or press Ctrl/Cmd+Shift+K) → tell Claude how to change it.</p>

    <div class="card">
      <h2>Connection</h2>
      <label for="apiKey">Anthropic API key</label>
      <input id="apiKey" type="password" placeholder="sk-ant-…" autocomplete="off" />
      <div class="hint">Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com → API keys</a>. Stored only in your browser; sent only to Anthropic.</div>

      <label for="model" style="margin-top:16px;">Model</label>
      <select id="model">
        <option value="claude-haiku-4-5-20251001">Haiku 4.5 — fastest & cheapest</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6 — balanced (recommended)</option>
        <option value="claude-opus-4-8">Opus 4.8 — most capable</option>
      </select>

      <div class="saverow" style="margin-top:16px;">
        <button class="btn btn-primary" id="saveConn">Save</button>
        <span id="status"></span>
      </div>
    </div>

    <div class="card">
      <h2>Style presets</h2>
      <div id="presetList"></div>
      <div class="add-row">
        <input class="name-in" id="newName" placeholder="Preset name" />
        <input id="newInstr" placeholder="Instruction, e.g. “Rewrite in a confident tone.”" />
        <button class="btn btn-ghost" id="addPreset">Add</button>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
